# Place this file at:  .github/workflows/news.yml  in your repo
name: market-news-agent

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC). Daily 9:00 IST = "30 3 * * *"
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed to commit seen.json back

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_agent.py

      - name: Save memory (seen.json)
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "update seen stories"
          git pull --rebase origin main || true
          git push
